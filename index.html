<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>With Love — Interactive Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{ --ink:#1e2a52; }
  *{box-sizing:border-box;}
  html,body{ height:100%; margin:0; background:#111; overflow:hidden; }
  body{ font-family: Georgia, serif; display:flex; align-items:center; justify-content:center; }

  .app{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
  }

  /* ================= PAGE 1 ================= */
  #page1{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform .6s cubic-bezier(.7,0,.3,1), opacity .5s ease;
    background:#000;
  }
  #page1.leaving{ transform: scale(1.15); opacity:0; }

  .canvas-wrap{
    position:relative;
    width:100%;
    height:100%;
    max-width: 177.78vh;   /* keep 16:9 */
    max-height: 56.25vw;
    margin:auto;
  }
  .canvas-wrap::before{
    content:"";
    display:block;
    padding-top:56.25%; /* 1080/1920 */
  }
  .canvas-inner{
    position:absolute;
    inset:0;
    background-image:url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAQDAwMDAgQDAwMEBAQFBgoGBgUFBgwICQcKDgwPDg4MDQ0PERYTDxAVEQ0NExoTFRcYGRkZDxIbHRsYHRYYGRj/2wBDAQQEBAYFBgsGBgsYEA0QGBg[...]
    background-size:100% 100%;
    background-repeat:no-repeat;
  }

  .item{
    position:absolute;
    cursor:grab;
    user-select:none;
    -webkit-user-drag:none;
    touch-action:none;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.35));
    transition: z-index 0.1s ease;
  }
  .item img{ width:100%; height:auto; display:block; pointer-events:none; }
  .item:active{ cursor:grabbing; z-index:999 !important; filter: drop-shadow(0 10px 16px rgba(0,0,0,0.5)); }
  .item:hover{ filter: drop-shadow(0 8px 14px rgba(0,0,0,0.45)) brightness(1.03); }

  .click-photo{
    position:absolute;
    cursor:pointer;
    transition: transform .35s cubic-bezier(.5,-0.4,.5,1.4), z-index 0.1s ease;
  }
  .click-photo img{ width:100%; height:auto; display:block; pointer-events:none; border-radius: 4px; }
  .click-photo.pulse{ animation: shrinkGrow .55s cubic-bezier(.5,0,.5,1) forwards; }
  .click-photo.clicked{ z-index:999 !important; }
  @keyframes shrinkGrow{
    0%{ transform: scale(1); }
    45%{ transform: scale(0.55); }
    100%{ transform: scale(2.8); opacity:0; }
  }

  .hint{
    position:absolute;
    bottom:3%; left:50%; transform:translateX(-50%);
    font-family: Arial, sans-serif;
    font-size: clamp(10px, 1.3vw, 14px);
    color:#fff;
    background:rgba(0,0,0,0.5);
    padding:6px 16px;
    border-radius:20px;
    white-space:nowrap;
    z-index: 500;
  }

  /* ================= PAGE 2 (placeholder) ================= */
  #page2{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f0e9d2;
    background-image: repeating-linear-gradient(#f0e9d2 0 27px, #c9c2a8 27px 28px);
    opacity:0;
    pointer-events:none;
    transition: opacity .5s ease;
  }
  #page2.entering{ opacity:1; pointer-events:all; }
  .page2-inner{ text-align:center; font-family: Georgia, serif; color: var(--ink); }
  .page2-inner h1{ font-size:clamp(24px,4vw,42px); margin-bottom:10px; }
  .page2-inner p{ font-family: Arial, sans-serif; color:#666; font-size:14px; }
  .back-btn{
    margin-top:20px; font-family: Arial, sans-serif; font-size:12px;
    background:none; border:1px solid var(--ink); color:var(--ink);
    padding:8px 16px; border-radius:20px; cursor:pointer;
  }
</style>
</head>
<body>

<div class="app">

    <div class="canvas-wrap">
      <div class="canvas-inner" id="canvasInner">

        </div>

        <!-- BINTANG KERTAS - tengah bawah -->
        <div class="item" data-name="bintang kertas" style="left:24.74%; top:38.89%; width:4.95%; z-index:30;">
          <img src="data:image/webp;base64,UklGRlRwAABXRUJQVlA4WAoAAAAQAAAAegIAUAEAQUxQSMpWAAABCUiSpEaMooEGyUb/f/CKPDH3iP5PAH5R10kAVozf/m7QqvDzetBKVH9Ol30o0Nz9Sv9K731q7n6hM8afQbOIM12m2coAq1I9AFT7JlpEx[...]
        </div>

        <!-- SURAT - kiri bawah tengah -->
        <div class="item" data-name="surat" style="left:16%; top:38%; width:8%; z-index:28;">
          <img src="data:image/webp;base64,UklGRi7zAABXRUJQVlA4WAoAAAAQAAAAgwMAqwIAQUxQSGklAAAN76G4bRsHSa6tcfvP14vyvREiIqscTI7bFuw+AQnb/wGnwFJt0bZHGLlt4wh2sMG0/f+Dp4+3XCP6PwE4uaB9Nc/wVp/NGbudK6aXmBncL[...]
        </div>

      </div>
    </div>
  </div>

  <div id="page2">
    <div class="page2-inner">
      <h1>Thank you for the memories 💕</h1>
      <p>This page is reserved for more to come...</p>
      <button class="back-btn">← Back</button>
    </div>
  </div>
</div>

<script>
  // ===== INTERACTIVE DRAGGING (untuk semua .item) =====
  const items = document.querySelectorAll('.item');
  let draggedEl = null;
  let offsetX = 0;
  let offsetY = 0;

  items.forEach(item => {
    item.addEventListener('mousedown', startDrag);
    item.addEventListener('touchstart', startDrag);
  });

  function startDrag(e) {
    draggedEl = e.currentTarget;
    const rect = draggedEl.getBoundingClientRect();
    const parent = draggedEl.offsetParent;
    const parentRect = parent.getBoundingClientRect();

    const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
    const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;

    offsetX = clientX - (rect.left - parentRect.left);
    offsetY = clientY - (rect.top - parentRect.top);

    draggedEl.style.zIndex = '999';

    document.addEventListener('mousemove', moveDrag);
    document.addEventListener('touchmove', moveDrag);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
  }

  function moveDrag(e) {
    if (!draggedEl) return;

    const parent = draggedEl.offsetParent;
    const parentRect = parent.getBoundingClientRect();

    const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
    const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;

    let x = clientX - parentRect.left - offsetX;
    let y = clientY - parentRect.top - offsetY;

    x = Math.max(0, Math.min(x, parent.clientWidth - draggedEl.offsetWidth));
    y = Math.max(0, Math.min(y, parent.clientHeight - draggedEl.offsetHeight));

    draggedEl.style.left = (x / parent.clientWidth) * 100 + '%';
    draggedEl.style.top = (y / parent.clientHeight) * 100 + '%';
  }

  function stopDrag() {
    if (draggedEl) {
      draggedEl.style.zIndex = draggedEl.getAttribute('data-original-z') || '10';
    }
    draggedEl = null;

    document.removeEventListener('mousemove', moveDrag);
    document.removeEventListener('touchmove', moveDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchend', stopDrag);
  }

  // ===== CLICKABLE PHOTOS (tincase, snoopy, susan) =====
  const clickPhotos = document.querySelectorAll('.click-photo');
  clickPhotos.forEach(photo => {
    photo.addEventListener('click', handlePhotoClick);
  });

  function handlePhotoClick(e) {
    const photo = e.currentTarget;
    if (photo.classList.contains('pulse')) return; // prevent multiple clicks

    photo.classList.add('pulse', 'clicked');
    photo.style.zIndex = '999';

    setTimeout(() => {
      const page1 = document.getElementById('page1');
      const page2 = document.getElementById('page2');
      const backBtn = document.querySelector('.back-btn');

      page1.classList.add('leaving');
      page2.classList.add('entering');

      backBtn.addEventListener('click', () => {
        page1.classList.remove('leaving');
        page2.classList.remove('entering');
        photo.classList.remove('pulse', 'clicked');
      });
    }, 550);
  }

  // Store original z-index
  items.forEach(item => {
    item.setAttribute('data-original-z', item.style.zIndex || '10');
  });
</script>

</body>
</html>
